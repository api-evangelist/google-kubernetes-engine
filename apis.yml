aid: google-kubernetes-engine
name: Google Kubernetes Engine
description: >-
  Google Kubernetes Engine (GKE) is a managed Kubernetes service on Google Cloud
  that provides a production-ready environment for deploying, managing, and
  scaling containerized applications. It offers autopilot and standard modes,
  built-in security, multi-cluster management, and seamless integration with
  Google Cloud services.
