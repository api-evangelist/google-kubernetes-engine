apis:
  - aid: google-kubernetes-engine:google-kubernetes-engine
    name: Google Kubernetes Engine
    description: >-
      Google Kubernetes Engine (GKE) is a managed, production-ready environment
      for deploying containerized applications on Google Cloud. It provides
      auto-scaling, auto-upgrade, auto-repair, and built-in security features
      to help you run Kubernetes clusters with minimal operational overhead.
      GKE Autopilot further simplifies cluster management by automatically
      provisioning and managing the underlying infrastructure.
